name: Build macOS native helper

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
        description: "Target architecture (arm64 or x64)"

jobs:
  build:
    name: Native ${{ inputs.arch }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build native helper
        run: npm run build:native:mac
        env:
          OPENSCREEN_MAC_HELPER_ARCHS: ${{ inputs.arch }}
