<!-- @dsCard group="Brand" viewport="700x170" subtitle="Resting card vs floating popover" name="Elevation" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:30px 28px;display:flex;gap:34px;align-items:center;}
  .sw{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .box{width:150px;height:70px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-2xl);display:grid;place-items:center;font-size:11.5px;color:var(--fg-2);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--meta);}
</style></head>
<body>
  <div class="sw"><div class="box" style="box-shadow:var(--elev-card);">elev-card</div><span class="n">resting cards</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--elev-pop);">elev-pop</div><span class="n">floating panels · glass</span></div>
</body></html>
