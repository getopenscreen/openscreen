<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:26px 24px;display:flex;align-items:center;gap:40px;}
  .lock{display:inline-flex;align-items:center;gap:9px;}
  .lock img{width:26px;height:26px;object-fit:contain;display:block;}
  .word{font-size:18px;font-weight:600;letter-spacing:-0.015em;color:var(--fg-emphasis);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--meta);}
</style></head>
<body>
  <div style="display:flex;flex-direction:column;gap:12px;">
    <div class="lock"><img src="../assets/logo-icon.png" alt="OpenScreen"><span class="word">OpenScreen</span></div>
    <span class="n">logo-icon.png · Geist 600 · -0.015em</span>
  </div>
  <img src="../assets/logo-icon.png" alt="OpenScreen mark" style="width:48px;height:48px;object-fit:contain;">
</body></html>
