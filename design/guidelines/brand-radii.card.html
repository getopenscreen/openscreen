<!-- @dsCard group="Brand" viewport="700x170" subtitle="Nested-radius rhythm, 2 → fully round" name="Radii" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:22px 20px;display:flex;gap:16px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:64px;height:44px;background:var(--surface-2);border:1px solid var(--border-hi);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--meta);}
  .lab{font-size:10.5px;color:var(--fg-2);}
</style></head>
<body>
  <div class="sw"><div class="box" style="border-radius:6px;"></div><span class="lab">sm control</span><span class="n">6px</span></div>
  <div class="sw"><div class="box" style="border-radius:9px;"></div><span class="lab">md control</span><span class="n">9px</span></div>
  <div class="sw"><div class="box" style="border-radius:11px;"></div><span class="lab">card / clip</span><span class="n">11px</span></div>
  <div class="sw"><div class="box" style="border-radius:14px;"></div><span class="lab">composer</span><span class="n">14px</span></div>
  <div class="sw"><div class="box" style="border-radius:16px;"></div><span class="lab">panel</span><span class="n">16px</span></div>
  <div class="sw"><div class="box" style="width:80px;border-radius:9999px;"></div><span class="lab">pill</span><span class="n">full</span></div>
</body></html>
