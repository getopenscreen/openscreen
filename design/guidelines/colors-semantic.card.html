<!-- @dsCard group="Colors" viewport="700x150" subtitle="Timeline lanes & status — rationed accents" name="Semantic" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:20px;display:flex;gap:12px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px 0 8px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;border:1.5px solid;box-sizing:border-box;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .hex{font-family:var(--font-mono);font-size:9.5px;color:var(--meta);}
</style></head>
<body>
  <div class="sw"><span class="pill" style="border-color:var(--annotation);background:var(--annotation-wash);">Annotation</span><span class="hex">annotation · #fbbf24</span></div>
  <div class="sw"><span class="pill" style="border-color:var(--speed);background:var(--speed-wash);">1.5×</span><span class="hex">speed · #fb923c</span></div>
  <div class="sw"><span class="pill" style="border-color:var(--danger);background:var(--danger-soft);color:var(--danger);">Skip / cut</span><span class="hex">danger · #f87171</span></div>
  <div class="sw"><span class="pill" style="border-color:var(--accent);background:var(--accent-soft);color:var(--accent);">Zoom 1.8×</span><span class="hex">accent · #10b981</span></div>
</body></html>
