<!-- @dsCard group="Colors" viewport="700x140" subtitle="Primary → meta text ramp" name="Text" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-display);padding:22px 20px;display:flex;flex-direction:column;gap:11px;}
  .line{display:flex;align-items:baseline;gap:14px;}
  .t{font-size:17px;font-weight:600;letter-spacing:-0.01em;min-width:280px;}
  .n{font-family:var(--font-mono);font-size:10.5px;color:var(--meta);}
</style></head>
<body>
  <div class="line"><span class="t" style="color:var(--fg-emphasis);">fg-emphasis — headings, key numbers</span><span class="n">#ffffff</span></div>
  <div class="line"><span class="t" style="color:var(--fg-2);">fg-2 — strong body, labels</span><span class="n">#f5f7fa</span></div>
  <div class="line"><span class="t" style="color:var(--fg);">fg — primary body</span><span class="n">#e9edf3</span></div>
  <div class="line"><span class="t" style="color:var(--muted);">muted — secondary, inactive icons</span><span class="n">#828c99</span></div>
  <div class="line"><span class="t" style="color:var(--meta);">meta — timestamps, mono meta</span><span class="n">#565f6b</span></div>
</body></html>
