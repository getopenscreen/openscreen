<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:22px 20px;display:flex;align-items:flex-end;gap:16px;}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:var(--radius-xs);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--meta);}
</style></head>
<body>
  <div class="sw"><div class="bar" style="width:4px;height:4px;"></div><span class="n">2</span></div>
  <div class="sw"><div class="bar" style="width:8px;height:8px;"></div><span class="n">8</span></div>
  <div class="sw"><div class="bar" style="width:12px;height:12px;"></div><span class="n">12</span></div>
  <div class="sw"><div class="bar" style="width:16px;height:16px;"></div><span class="n">16</span></div>
  <div class="sw"><div class="bar" style="width:20px;height:20px;"></div><span class="n">20</span></div>
  <div class="sw"><div class="bar" style="width:24px;height:24px;"></div><span class="n">24</span></div>
  <div class="sw"><div class="bar" style="width:32px;height:32px;"></div><span class="n">32</span></div>
  <div class="sw"><div class="bar" style="width:48px;height:48px;"></div><span class="n">48</span></div>
</body></html>
