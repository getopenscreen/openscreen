<!-- @dsCard group="Type" viewport="700x230" subtitle="9.5px labels → 16.5px headings" name="Scale" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-display);padding:20px;display:flex;flex-direction:column;gap:12px;}
  .line{display:flex;align-items:baseline;gap:14px;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--meta);min-width:120px;}
</style></head>
<body>
  <div class="line"><span class="n">lg · 16.5 / 700</span><span style="font-size:16.5px;font-weight:700;letter-spacing:-0.01em;color:var(--fg-emphasis);">Source Transcript</span></div>
  <div class="line"><span class="n">md · 14 / 600</span><span style="font-size:14px;font-weight:600;letter-spacing:-0.01em;color:var(--fg-emphasis);">Background</span></div>
  <div class="line"><span class="n">base · 13 / 500</span><span style="font-size:13px;font-weight:500;color:var(--fg-2);">Describe the edit you want…</span></div>
  <div class="line"><span class="n">sm · 11.5 / 500</span><span style="font-size:11.5px;font-weight:500;color:var(--fg-2);">Remove silences</span></div>
  <div class="line"><span class="n">xs · 10.5 mono</span><span style="font-family:var(--font-mono);font-size:10.5px;color:var(--muted);">−0:37.3</span></div>
  <div class="line"><span class="n">xxs · 9.5 label</span><span style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.08em;color:var(--meta);">ASPECT RATIO</span></div>
</body></html>
